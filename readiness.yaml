apiVersion: v1
kind: Pod
metadata:
  name: readiness-probe-demo
  labels:
    app: readiness-demo
spec:
  containers:
  - name: app
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
    - |
      sleep 20
      touch /tmp/ready
      sleep 600
    readinessProbe:
      exec:
        command:
        - cat
        - /tmp/ready
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
